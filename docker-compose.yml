services:
  postgres:
    image: postgres:16
    container_name: inventario-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: inventario
      POSTGRES_PASSWORD: inventario
    ports:
      - "5432:5432"
    volumes:
      - inventario_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario -d inventario"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inventario_postgres_data:
